<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podcast Player</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
        }
        #player {
            margin-top: 20px;
            width: 80%;
            text-align: center;
        }
        #equalizer {
            width: 100%;
            height: 50px;
            background: linear-gradient(90deg, #ddd 10%, #444 10%, #444 20%, #ddd 20%, #ddd 30%, #444 30%, #444 40%, #ddd 40%, #ddd 50%, #444 50%);
            background-size: 20px 100%;
            animation: move 1s linear infinite;
        }
        @keyframes move {
            from { background-position: 0; }
            to { background-position: 50%; }
        }
    </style>
</head>
<body>
    <div id="player">
        <audio id="audio" controls preload="metadata">
            <source src="podcast.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
        <div id="equalizer"></div>
        <div>
            <button id="play">Play</button>
            <button id="pause">Pause</button>
            <button id="skip">Skip</button>
            <label for="speed">Speed:</label>
            <input type="range" id="speed" min="0.33" max="3" step="0.01" value="1">
            <label for="volume">Volume:</label>
            <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
        </div>
    </div>

    <script>
        const audio = document.getElementById('audio');
        const playButton = document.getElementById('play');
        const pauseButton = document.getElementById('pause');
        const skipButton = document.getElementById('skip');
        const speedControl = document.getElementById('speed');
        const volumeControl = document.getElementById('volume');

        playButton.addEventListener('click', () => audio.play());
        pauseButton.addEventListener('click', () => audio.pause());
        skipButton.addEventListener('click', () => audio.currentTime += 10);

        speedControl.addEventListener('input', () => {
            audio.playbackRate = speedControl.value;
        });

        volumeControl.addEventListener('input', () => {
            audio.volume = volumeControl.value;
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'ArrowRight') {
                audio.currentTime += 10;
            } else if (event.key === 'ArrowLeft') {
                audio.currentTime -= 10;
            } else if (event.key === 'ArrowUp') {
                audio.playbackRate = Math.min(3, audio.playbackRate + 0.1);
            } else if (event.key === 'ArrowDown') {
                audio.playbackRate = Math.max(0.33, audio.playbackRate - 0.1);
            }
        });
    </script>
</body>
</html>
